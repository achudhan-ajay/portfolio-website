<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Loader V1 - Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Persistent UI Elements -->
    <div class="logo-container">
        <img src="https://jhzcxtuowqnaurrkzcus.supabase.co/storage/v1/object/public/Assets/Intellaris_Studio_Main_Logo_White.svg" alt="Studio Logo">
    </div>

    <a href="https://codepen.io/IntellarisStudio/pen/jEMNLaO" class="source-link underline-hover" target="_blank">Source-Code</a>

    <!-- Loader Section -->
    <div id="loader">
        <div id="counter">0</div>

        <a class="main-button underline-hover" onclick="window.location.reload()">Refresh Me to see loader!</a>

    <!-- GSAP for smooth animations -->

    <script src="script.js"></script>
